# ============================================================
#  nginx config สำหรับ frontend container
#  วางไฟล์นี้ที่: frontend/nginx.conf
# ============================================================
server {
    listen 80;
    server_name localhost;

    # เสิร์ฟไฟล์ static ของ Vue
    root /usr/share/nginx/html;
    index index.html;

    # รองรับ SPA — ทุก path ที่ไม่เจอไฟล์จริง ให้ตกมาที่ index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ส่งต่อ request /api/** ไปยัง backend container
    # (ชื่อ "backend" = ชื่อ service ใน docker-compose, แก้พอร์ตให้ตรง)
    location /api/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ส่งต่อ request /uploads/** (รูปสินค้า/สลิป) ไป backend ด้วย
    location /uploads/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
    }
}