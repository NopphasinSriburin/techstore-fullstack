# 1. ตั้งค่าการเชื่อมต่อ Database (ระบุ Port 5433 ที่เราใช้)
spring.datasource.url=jdbc:postgresql://localhost:5433/it_gadget_shop
spring.datasource.username=admin
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. ตั้งค่า JPA / Hibernate (ตัวช่วยจัดการฐานข้อมูล)
# update = ให้ Java สร้างหรืออัปเดตตารางให้เราอัตโนมัติตามโค้ดที่เราเขียน
spring.jpa.hibernate.ddl-auto=update

# ให้โชว์คำสั่ง SQL ใน Terminal เวลาโปรแกรมทำงาน (ช่วยให้เราตรวจสอบง่ายขึ้น)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# บอกให้ Java รู้ว่าเราใช้ PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 3. ตั้งค่า Port ของฝั่ง Backend (ให้เว็บ Backend รันที่พอร์ต 8081)
server.port=8081

# ════════════════════════════════════════════════════════
# 4. ตั้งค่า JWT (ระบบความปลอดภัย)
# ════════════════════════════════════════════════════════
# กุญแจลับสำหรับเซ็น JWT (Base64, ยาวพอสำหรับ HS256)
# ⚠️ งานจริงควรเก็บเป็น Environment Variable ไม่ commit ขึ้น git
app.jwt.secret=ZmFrZS1zZWNyZXQta2V5LWdhZGdldHNob3AtY2hhbmdlLW1lLTEyMzQ1Njc4OTA=

# อายุ token (มิลลิวินาที) — 86400000 = 24 ชั่วโมง
app.jwt.expiration-ms=86400000

# ขนาดต่อ 1 ไฟล์ สูงสุด 10MB
spring.servlet.multipart.max-file-size=10MB
 
# ขนาดรวมทั้ง request สูงสุด 50MB (อัปได้หลายรูปพร้อมกัน)
spring.servlet.multipart.max-request-size=50MB